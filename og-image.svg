<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf8f4"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="12" height="630" fill="#c2410c"/>

  <!-- Building icon (scaled from favicon) -->
  <g transform="translate(80, 220) scale(2.5)">
    <rect x="5" y="20" width="22" height="8" fill="none" stroke="#1c1917" stroke-width="2" stroke-linejoin="round"/>
    <line x1="10" y1="20" x2="10" y2="14" stroke="#1c1917" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="16" y1="20" x2="16" y2="14" stroke="#1c1917" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="22" y1="20" x2="22" y2="14" stroke="#1c1917" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="6" y1="14" x2="26" y2="14" stroke="#1c1917" stroke-width="2" stroke-linecap="round"/>
    <polyline points="7,14 16,4 25,14" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <rect x="13" y="22" width="6" height="6" rx="3" fill="#c2410c"/>
  </g>

  <!-- Wordmark: "Civic" in Fraunces italic, "SCOPE" in DM Sans bold -->
  <text x="170" y="270" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="72" fill="#1c1917" letter-spacing="-1">Civic</text>
  <text x="170" y="340" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-weight="700" font-size="56" fill="#c2410c" letter-spacing="6">SCOPE</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-weight="400" font-size="28" fill="#1c1917">Municipal Construction Cost Estimator</text>

  <!-- Supporting line -->
  <text x="80" y="480" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-weight="400" font-size="20" fill="#78716c">Free for local government · civicscope.io</text>

  <!-- Subtle decorative rule -->
  <line x1="80" y1="390" x2="520" y2="390" stroke="#e7e2d8" stroke-width="1.5"/>
</svg>
